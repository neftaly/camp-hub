# Temporary BLE scanner on ESP32-C6 - find JK-BMS and Alpicool MAC addresses
esphome:
  name: ble-scanner

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 300ms
    window: 200ms
  on_ble_advertise:
    then:
      - lambda: |-
          if (x.get_name().size() > 0) {
            ESP_LOGI("ble_scan", "MAC: %s  Name: '%s'  RSSI: %d",
                     x.address_str().c_str(),
                     x.get_name().c_str(),
                     x.get_rssi());
          }
